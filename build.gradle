plugins {    id 'java'    id 'org.springframework.boot' version '3.2.5'    id 'io.spring.dependency-management' version '1.1.4'}group = 'org.financedashboard'version = '1.0-SNAPSHOT'java {    sourceCompatibility = '21'}repositories {    mavenCentral()}dependencies {    implementation("org.springframework.boot:spring-boot-starter-data-jpa")    implementation("org.springframework.boot:spring-boot-starter-web")    implementation 'org.springframework.boot:spring-boot-starter-security'    //MapStruct    implementation("org.mapstruct:mapstruct:1.6.3")    annotationProcessor("org.mapstruct:mapstruct-processor:1.6.3")    // JWT    implementation 'io.jsonwebtoken:jjwt-api:0.11.5'    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'    testImplementation platform('org.junit:junit-bom:6.0.0')    testImplementation 'org.junit.jupiter:junit-jupiter'    runtimeOnly 'com.h2database:h2'    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'}test {    useJUnitPlatform()}